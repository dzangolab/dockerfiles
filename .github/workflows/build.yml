name: Build and push image

on:
  push:
    tags:
      - '*/[0-9]*.[0-9]*.[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Parse image and version from tag
        id: parse
        run: |
          tag="${GITHUB_REF_NAME}"
          image="${tag%%/*}"
          version="${tag#*/}"

          if [ ! -d "$image" ]; then
            echo "::error::No directory named '$image' at repo root (parsed from tag '$tag')"
            exit 1
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        env:
          IMAGE: ${{ steps.parse.outputs.image }}
          VERSION: ${{ steps.parse.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -f "$IMAGE/Dockerfile.amd64" ]; then
            ./build-manifest.sh "$IMAGE" "$VERSION"
          else
            ./build.sh "$IMAGE" "$VERSION"
          fi
